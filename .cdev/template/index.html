<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cdev — Ready</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 48px;
      max-width: 520px;
      width: 90%;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .checks {
      list-style: none;
      margin-bottom: 32px;
    }
    .checks li {
      padding: 10px 0;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
    }
    .checks li:last-child { border-bottom: none; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .dot.pending {
      background: #555;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .hint {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 8px;
      padding: 16px;
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }
    .hint code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #ccc;
    }
    .greeting {
      font-size: 13px;
      color: #666;
      margin-top: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>cdev</h1>
    <div class="subtitle">Scaffold is running</div>

    <ul class="checks">
      <li><span class="dot"></span> Dev server responding</li>
      <li><span class="dot" id="claude-dot"></span> <span id="claude-status">Waiting for Claude Code...</span></li>
    </ul>

    <div class="hint">
      This is the starter page from the template. Replace it with your
      own project — update <code>package.json</code> and this
      <code>index.html</code>, then re-run <code>./cdev claude</code>.
    </div>

    <div class="greeting">Hello, Claude.</div>
  </div>
</body>
</html>
