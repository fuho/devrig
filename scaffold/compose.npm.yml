services:
  dev:
    image: ${DEVRIG_PROJECT:-my-project}-dev-npm:latest
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
    build:
      context: .devrig
      dockerfile: Dockerfile.npm
      args:
        USER_UID: ${HOST_UID:-501}
      labels:
        devrig.project: ${DEVRIG_PROJECT:-my-project}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - ./.devrig/home:/home/dev
    environment:
      - CLAUDE_CONFIG_DIR=/home/dev/.claude
      - CLAUDE_INSTALL_METHOD=npm
      - BRIDGE_PORT=9229
      - TERM=xterm-256color
      - NODE_OPTIONS=--max-old-space-size=4096
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "bash", "-c", "command -v claude"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4'

volumes:
  node_modules:
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
