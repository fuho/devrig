<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devrig</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #161616; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 48px; max-width: 520px; width: 90%; text-align: center;
    }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .status {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 24px; font-size: 14px; color: #22c55e;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .greeting { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>devrig</h1>
    <div class="subtitle">my-project</div>
    <div class="status"><span class="dot"></span> Ready</div>
    <div class="greeting">Hello, Claude.</div>
  </div>
  <!--devrig-config
  workspace: /workspace
  dev_server: http://localhost:3000
  chrome_bridge: enabled
  tool: claude
  -->
</body>
</html>
