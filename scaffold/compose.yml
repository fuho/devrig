services:
  # ── Outbound traffic proxy (mitmproxy) ─────────────────────────────────
  # All dev container traffic routes through this sidecar for inspection
  # and domain allowlisting. Web UI at http://localhost:8081.
  mitmproxy:
    build:
      context: ${DEVRIG_ENV_DIR:-.devrig}
      dockerfile: Dockerfile.mitmproxy
    # Starts as root for iptables, drops to mitmproxy for mitmweb
    user: "root"
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Fix log dir permissions and run firewall as root
        chown -R mitmproxy:mitmproxy /logs /home/mitmproxy/.mitmproxy
        /usr/local/bin/firewall.sh || echo "WARNING: Firewall setup failed"
        exec gosu mitmproxy mitmweb --mode transparent --web-host 0.0.0.0 --set block_global=false --set connection_strategy=lazy --set web_password=devrig -s /addons/allowlist.py -w /logs/traffic-%Y-%m-%d_%H.mitm
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${DEVRIG_ENV_DIR:-.devrig}/mitmproxy/allowlist.py:/addons/allowlist.py:ro
      - ${DEVRIG_ENV_DIR:-.devrig}/firewall.sh:/usr/local/bin/firewall.sh:ro
      - mitmproxy-logs:/logs
      - mitmproxy-certs:/home/mitmproxy/.mitmproxy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8081/ | grep -qE '^(200|403)' && iptables -t nat -S OUTPUT | grep -q REDIRECT"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 45s

  # ── Development container ──────────────────────────────────────────────
  dev:
    image: ${DEVRIG_PROJECT:-my-project}-dev:latest
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
    build:
      context: ${DEVRIG_ENV_DIR:-.devrig}
      dockerfile: Dockerfile
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
      labels:
        devrig.project: ${DEVRIG_PROJECT:-my-project}
    # Route all outbound traffic through mitmproxy sidecar
    network_mode: "service:mitmproxy"
    depends_on:
      mitmproxy:
        condition: service_healthy
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - ${DEVRIG_ENV_DIR:-.devrig}/home:/home/dev
      - ./.devrig/CLAUDE.md:/workspace/CLAUDE.md:ro
      - devrig-mask:/workspace/.devrig
      - mitmproxy-certs:/usr/local/share/mitmproxy-certs:ro
    environment:
      - CLAUDE_CONFIG_DIR=/home/dev/.claude
      - BRIDGE_PORT=9229
      - BRIDGE_ENABLED=${BRIDGE_ENABLED:-0}
      - BRIDGE_VERBOSE=${BRIDGE_VERBOSE:-0}
      - CLAUDE_VERSION=${CLAUDE_VERSION:-latest}
      - TERM=xterm-256color
      - NODE_OPTIONS=--max-old-space-size=4096
      - NODE_EXTRA_CA_CERTS=/usr/local/share/mitmproxy-certs/mitmproxy-ca-cert.pem
    # Entrypoint runs as root to chown /home/dev, then drops to dev via gosu
    user: "root"
    # NOTE: extra_hosts goes on mitmproxy service (shared network namespace)
    stdin_open: true
    tty: true
    init: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "bash", "-c", "command -v claude"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4'

volumes:
  node_modules:
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
  devrig-mask:
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
  mitmproxy-logs:
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
  mitmproxy-certs:
    labels:
      devrig.project: ${DEVRIG_PROJECT:-my-project}
